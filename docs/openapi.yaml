openapi: 3.1.0
info:
  title: CampusGuard API
  version: 1.1.0
servers:
  - url: https://campus-guard-7rq8.onrender.com/api
  - url: http://localhost:3000/api
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    dashboardCookie:
      type: apiKey
      in: cookie
      name: cg_access
  schemas:
    SensorEvent:
      type: object
      required: [event_id, device_id, measured_at, app_state]
      properties:
        event_id: { type: string, format: uuid }
        device_id: { type: string, format: uuid }
        measured_at: { type: string, format: date-time }
        app_state:
          type: string
          enum: [foreground, background, inactive]
        latitude: { type: [number, "null"], minimum: -90, maximum: 90 }
        longitude: { type: [number, "null"], minimum: -180, maximum: 180 }
        location_accuracy: { type: [number, "null"], minimum: 0 }
        speed: { type: [number, "null"], description: km/h }
        noise_level: { type: [number, "null"], description: Derived average dB estimate }
        noise_peak: { type: [number, "null"], description: Derived peak dB estimate }
        acceleration_x: { type: [number, "null"] }
        acceleration_y: { type: [number, "null"] }
        acceleration_z: { type: [number, "null"] }
        acceleration_magnitude: { type: [number, "null"] }
        battery_level: { type: [number, "null"], minimum: 0, maximum: 100 }
        network_type: { type: [string, "null"] }
        sample_quality: { type: object, additionalProperties: true }
        is_emergency: { type: boolean, default: false }
    SensorEventBatchItem:
      type: object
      required: [event_id, measured_at, app_state]
      properties:
        event_id: { type: string, format: uuid }
        measured_at: { type: string, format: date-time }
        app_state:
          type: string
          enum: [foreground, background, inactive]
        latitude: { type: [number, "null"] }
        longitude: { type: [number, "null"] }
        location_accuracy: { type: [number, "null"] }
        speed: { type: [number, "null"] }
        noise_level: { type: [number, "null"] }
        noise_peak: { type: [number, "null"] }
        acceleration_x: { type: [number, "null"] }
        acceleration_y: { type: [number, "null"] }
        acceleration_z: { type: [number, "null"] }
        acceleration_magnitude: { type: [number, "null"] }
        battery_level: { type: [number, "null"] }
        network_type: { type: [string, "null"] }
        sample_quality: { type: object, additionalProperties: true }
        is_emergency: { type: boolean, default: false }
    AnalysisSettings:
      type: object
      properties:
        noise_threshold_db: { type: number, default: 85 }
        noise_min_devices: { type: integer, default: 3 }
        noise_window_seconds: { type: integer, default: 30 }
        noise_min_readings: { type: integer, default: 2 }
        noise_cooldown_seconds: { type: integer, default: 120 }
        noise_resolve_seconds: { type: integer, default: 60 }
        max_location_accuracy_m: { type: number, default: 25 }
        zone_confirmation_count: { type: integer, default: 2 }
        zone_confirmation_window_seconds: { type: integer, default: 15 }
        speed_limit_kmh: { type: number, default: 30 }
        raw_retention_days: { type: integer, default: 7 }
        summary_retention_days: { type: integer, default: 90 }
paths:
  /health:
    get:
      security: []
      responses:
        "200": { description: Service is healthy }
  /auth/login:
    post:
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [student_id, password]
              properties:
                student_id: { type: string }
                password: { type: string }
      responses:
        "200": { description: Mobile access and refresh tokens }
        "401": { description: Invalid credentials }
  /auth/register:
    post:
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [student_id, password, registration_ticket]
              properties:
                student_id: { type: string }
                password: { type: string, minLength: 8 }
                registration_ticket: { type: string }
      responses:
        "201": { description: Student registered }
        "403": { description: Missing, expired, or used BTU ticket }
  /auth/refresh:
    post:
      security: []
      responses:
        "200": { description: Rotated mobile session }
  /v1/sensor-events:
    post:
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SensorEvent" }
      responses:
        "201": { description: Event stored and analyzed }
        "200": { description: Duplicate event accepted idempotently }
        "403": { description: Device is not owned by the student }
  /v1/sensor-events/batch:
    post:
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [device_id, events]
              properties:
                device_id: { type: string, format: uuid }
                events:
                  type: array
                  minItems: 1
                  maxItems: 100
                  items: { $ref: "#/components/schemas/SensorEventBatchItem" }
      responses:
        "201": { description: Batch processed }
        "400": { description: Invalid or older than 24 hours }
  /mobile/push-token:
    put:
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Expo push token registered }
  /settings/analysis:
    get:
      security: [{ dashboardCookie: [] }]
      responses:
        "200":
          description: Global analysis settings
    patch:
      security: [{ dashboardCookie: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AnalysisSettings" }
      responses:
        "200": { description: Settings updated }
        "403": { description: Admin required }
  /zones:
    get:
      security:
        - bearerAuth: []
        - dashboardCookie: []
      responses:
        "200": { description: Active polygons for local and server analysis }
  /alerts:
    get:
      security: [{ dashboardCookie: [] }]
      responses:
        "200": { description: Admin alarm list }
