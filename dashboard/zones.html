<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusGuard - Bölge Yönetimi</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="/vendor/leaflet/leaflet.css">
  <link rel="stylesheet" href="/vendor/leaflet-draw/leaflet.draw.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand"><span class="shield">🛡️</span><h2>CampusGuard</h2></div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item"><span class="icon">📊</span> Dashboard</a>
        <a href="alerts.html" class="nav-item"><span class="icon">🔔</span> Alarmlar</a>
        <a href="devices.html" class="nav-item"><span class="icon">📱</span> Cihazlar</a>
        <a href="zones.html" class="nav-item active"><span class="icon">🗺️</span> Bölgeler</a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">A</div>
          <div><div class="user-name" id="userName">Admin</div><div class="user-role" id="userRole">admin</div></div>
        </div>
        <button class="btn btn-outline btn-sm btn-full" data-click-action="logout" style="margin-top:8px">Çıkış Yap</button>
      </div>
    </aside>

    <main class="main-content">
      <header class="header">
        <h1>🗺️ Bölge Yönetimi</h1>
        <div class="header-actions">
          <span style="font-size:12px;color:var(--text-muted)">Harita üzerinde polygon çizerek yeni bölge ekleyin</span>
        </div>
      </header>

      <div class="page-content">
        <div class="grid-2">
          <!-- Map -->
          <div class="card">
            <div class="card-header"><h3>Kampüs Haritası</h3><button class="btn btn-sm btn-outline" data-click-action="refreshZones">↻ Yenile</button></div>
            <div class="card-body" style="padding:0">
              <div class="map-container" style="height:600px"><div id="zonesMap" style="height:100%"></div></div>
            </div>
          </div>

          <!-- Zone List + Add Form -->
          <div>
            <div class="card" style="margin-bottom:24px">
              <div class="card-header"><h3>Global Analiz Ayarlari</h3></div>
              <div class="card-body">
                <div class="grid-2">
                  <div class="form-group"><label>Gurultu esigi (dB)</label><input type="number" id="noiseThreshold" min="40" max="130"></div>
                  <div class="form-group"><label>Minimum cihaz</label><input type="number" id="noiseMinDevices" min="2" max="100"></div>
                  <div class="form-group"><label>Pencere (sn)</label><input type="number" id="noiseWindow" min="5" max="600"></div>
                  <div class="form-group"><label>Cihaz basi olcum</label><input type="number" id="noiseMinReadings" min="1" max="20"></div>
                  <div class="form-group"><label>Cooldown (sn)</label><input type="number" id="noiseCooldown" min="10" max="3600"></div>
                  <div class="form-group"><label>Cozulme suresi (sn)</label><input type="number" id="noiseResolve" min="10" max="3600"></div>
                  <div class="form-group"><label>Maks. GPS dogrulugu (m)</label><input type="number" id="maxLocationAccuracy" min="5" max="200"></div>
                  <div class="form-group"><label>Hiz limiti (km/h)</label><input type="number" id="speedLimit" min="5" max="150"></div>
                </div>
                <button class="btn btn-primary" data-click-action="saveAnalysisSettings">Ayarlari Kaydet</button>
                <span id="settingsStatus" style="margin-left:10px;color:var(--text-muted)"></span>
              </div>
            </div>
            <!-- Add Zone Form (shown after drawing) -->
            <div class="card" id="zoneFormCard" style="display:none;margin-bottom:24px">
              <div class="card-header"><h3>Yeni Bölge Bilgileri</h3></div>
              <div class="card-body">
                <div class="form-group"><label>Bölge Adı</label><input type="text" id="zoneName" placeholder="Örn: Kütüphane Önü"></div>
                <div class="form-group">
                  <label>Bölge Tipi</label>
                  <select id="zoneType" data-change-action="updateZoneColor">
                    <option value="normal">Normal</option>
                    <option value="restricted">Kısıtlı</option>
                    <option value="danger">Tehlikeli</option>
                  </select>
                </div>
                <div class="form-group"><label>Maks. Kapasite</label><input type="number" id="zoneCapacity" value="100" min="0"></div>
                <div class="form-group"><label>Renk</label><input type="color" id="zoneColor" value="#3b82f6" style="width:60px;height:36px;padding:2px"></div>
                <div class="form-group"><label>Açıklama</label><textarea id="zoneDescription" rows="2" placeholder="Opsiyonel"></textarea></div>

                <div style="display:flex;gap:12px">
                  <button class="btn btn-primary" data-click-action="saveZone">Kaydet</button>
                  <button class="btn btn-outline" data-click-action="cancelZone">İptal</button>
                </div>
              </div>
            </div>

            <!-- Zone List -->
            <div class="card">
              <div class="card-header"><h3>Kayıtlı Bölgeler</h3></div>
              <div class="card-body" style="padding:0">
                <div id="zoneList">
                  <div class="loading-spinner"><div class="spinner"></div> Yükleniyor...</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/vendor/leaflet/leaflet.js"></script>
  <script src="/vendor/leaflet-draw/leaflet.draw.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/actions.js"></script>
  <script src="js/zones.js"></script>

  <!-- Bölge Düzenleme Modalı -->
  <div class="modal-overlay" id="editZoneModal">
    <div class="modal" style="max-width:500px">
      <div class="modal-header">
        <h3>✏️ Bölge Düzenle</h3>
        <button class="modal-close" data-click-action="closeEditZoneModal">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editZoneId">
        <div class="form-group">
          <label>Bölge Adı</label>
          <input type="text" id="editZoneName" placeholder="Örn: Kütüphane Önü">
        </div>
        <div class="form-group">
          <label>Bölge Tipi</label>
          <select id="editZoneType">
            <option value="normal">Normal</option>
            <option value="restricted">Kısıtlı</option>
            <option value="danger">Tehlikeli</option>
          </select>
        </div>
        <div class="form-group">
          <label>Maks. Kapasite <small style="color:var(--text-muted)">(girilemez bölgeler için 0)</small></label>
          <input type="number" id="editZoneCapacity" min="0" value="100">
        </div>
        <div class="form-group">
          <label>Renk</label>
          <input type="color" id="editZoneColor" value="#3b82f6" style="width:60px;height:36px;padding:2px">
        </div>
        <div class="form-group">
          <label>Açıklama</label>
          <textarea id="editZoneDescription" rows="2" placeholder="Opsiyonel"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" data-click-action="closeEditZoneModal">İptal</button>
        <button class="btn btn-primary" data-click-action="updateZone">💾 Kaydet</button>
      </div>
    </div>
  </div>

</body>
</html>
