<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusGuard - Cihazlar</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand"><span class="shield">🛡️</span><h2>CampusGuard</h2></div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item"><span class="icon">📊</span> Dashboard</a>
        <a href="alerts.html" class="nav-item"><span class="icon">🔔</span> Alarmlar</a>
        <a href="devices.html" class="nav-item active"><span class="icon">📱</span> Cihazlar</a>
        <a href="zones.html" class="nav-item"><span class="icon">🗺️</span> Bölgeler</a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">A</div>
          <div><div class="user-name" id="userName">Admin</div><div class="user-role" id="userRole">admin</div></div>
        </div>
        <button class="btn btn-outline btn-sm btn-full" onclick="logout()" style="margin-top:8px">Çıkış Yap</button>
      </div>
    </aside>

    <main class="main-content">
      <header class="header">
        <h1>📱 Cihaz Yönetimi</h1>
        <div class="header-actions">
          <button class="btn btn-primary btn-sm" onclick="showRegisterDevice()">+ Cihaz Ekle</button>
        </div>
      </header>

      <div class="page-content">
        <div class="card">
          <div class="card-header"><h3>Kayıtlı Cihazlar</h3></div>
          <div class="card-body" style="padding:0">
            <div class="table-container">
              <table>
                <thead>
                  <tr><th>Cihaz Adı</th><th>Tip</th><th>Platform</th><th>Durum</th><th>Son Görülme</th><th>Konum</th><th>İşlem</th></tr>
                </thead>
                <tbody id="deviceTableBody">
                  <tr><td colspan="7" class="loading-spinner"><div class="spinner"></div> Yükleniyor...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Register Device Modal -->
  <div class="modal-overlay" id="deviceModal">
    <div class="modal">
      <div class="modal-header"><h3>Yeni Cihaz Kaydet</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
      <div class="modal-body">
        <div class="form-group"><label>Cihaz Adı</label><input type="text" id="deviceName" placeholder="Örn: Samsung Galaxy S24"></div>
        <div class="form-group"><label>Cihaz Tipi</label><select id="deviceType"><option value="smartphone">Akıllı Telefon</option><option value="tablet">Tablet</option><option value="other">Diğer</option></select></div>
        <div class="form-group"><label>Platform</label><select id="devicePlatform"><option value="Android">Android</option><option value="iOS">iOS</option><option value="Web">Web</option></select></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal()">İptal</button>
        <button class="btn btn-primary" onclick="registerDevice()">Kaydet</button>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/devices.js"></script>
</body>
</html>
