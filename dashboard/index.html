<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CampusGuard - Kampüs Güvenliği ve Çevresel Gözlem Platformu">
  <title>CampusGuard - Admin Girişi</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-box fade-in">
      <div class="login-logo">
        <div class="shield">🛡️</div>
        <h1>CampusGuard</h1>
        <p>Kampüs Güvenliği ve Çevresel Gözlem Platformu</p>
        <small style="color:#f59e0b;font-size:0.75rem;margin-top:4px;display:block;">Admin Paneli</small>
      </div>

      <div id="alertBox" class="alert-msg"></div>

      <!-- Admin Login Form -->
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="admin@btu.edu.tr" required>
        </div>
        <div class="form-group">
          <label for="loginPassword">Şifre</label>
          <input type="password" id="loginPassword" placeholder="••••••" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="loginBtn">Giriş Yap</button>
      </form>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
