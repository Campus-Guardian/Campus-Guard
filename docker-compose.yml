version: '3.8'

services:
  campusguard:
    build: .
    container_name: campusguard-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=15m
      - REFRESH_TOKEN_DAYS=${REFRESH_TOKEN_DAYS:-30}
      - COOKIE_SECURE=true
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - ENABLE_SCHEDULERS=${ENABLE_SCHEDULERS:-true}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - EXPO_ACCESS_TOKEN=${EXPO_ACCESS_TOKEN}
